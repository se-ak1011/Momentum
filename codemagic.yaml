workflows:
  momentum-expo:
    name: Momentum Expo CI
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: 22.18.0
      vars:
        # Expo / EAS
        EXPO_TOKEN: Encrypted(EXPO_TOKEN)
        # Supabase
        EXPO_PUBLIC_SUPABASE_URL: Encrypted(EXPO_PUBLIC_SUPABASE_URL)
        EXPO_PUBLIC_SUPABASE_ANON_KEY: Encrypted(EXPO_PUBLIC_SUPABASE_ANON_KEY)
        # OpenAI (NOTE: in production proxy through your backend and remove this var)
        EXPO_PUBLIC_OPENAI_API_KEY: Encrypted(EXPO_PUBLIC_OPENAI_API_KEY)
        # Optional
        EXPO_PUBLIC_API_BASE_URL: Encrypted(EXPO_PUBLIC_API_BASE_URL)
        EXPO_PUBLIC_ANALYTICS_KEY: Encrypted(EXPO_PUBLIC_ANALYTICS_KEY)
        # iOS signing — provisioning profile and certificate are managed via EAS credentials
        # Store these in EAS (eas credentials) or add Codemagic code-signing identities
        APPLE_ID: Encrypted(APPLE_ID)
        APPLE_TEAM_ID: Encrypted(APPLE_TEAM_ID)
        ASC_APP_ID: Encrypted(ASC_APP_ID)
        # Android keystore
        CM_KEYSTORE_PATH: Encrypted(CM_KEYSTORE_PATH)
        CM_KEYSTORE_PASSWORD: Encrypted(CM_KEYSTORE_PASSWORD)
        CM_KEY_ALIAS: Encrypted(CM_KEY_ALIAS)
        CM_KEY_PASSWORD: Encrypted(CM_KEY_PASSWORD)
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Lint
        script: npm run lint
      - name: Test
        script: npm run test -- --runInBand
      - name: Typecheck
        script: npm run typecheck
      - name: Build Android (EAS, non-blocking)
        script: npx eas build --platform android --profile production --non-interactive --no-wait --json > android-build.json
      - name: Build iOS (EAS, non-blocking)
        script: npx eas build --platform ios --profile production --non-interactive --no-wait --json > ios-build.json
    artifacts:
      - android-build.json
      - ios-build.json
    publishing:
      email:
        recipients:
          - team@example.com
        notify:
          success: true
          failure: true
